<body></body>
<script src="https://cdn.jsdelivr.net/gh/netizenorg/netnet-standard-library/build/nn.min.js"></script>
<script>

  function draw () {
if (nn.mouseDown)
    {
let x = nn.mouseX
let y = nn.mouseY
let c = nn.random(360)

    /* global nn */
nn.create("a-box")
  .content("&#x1FAF0")
  .position(x, y)
  .scale(3)
  .hueRotate(c)
  .addTo("body")

    }
    
  }
  nn.on('mousemove',draw)
  
</script>
